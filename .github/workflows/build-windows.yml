name: Build Windows Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-windows:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x64
          - target: aarch64-pc-windows-msvc
            arch: arm64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: pomc-rally-planner/src-tauri

      - name: Install dependencies
        working-directory: pomc-rally-planner
        run: npm install

      - name: Build Tauri app
        working-directory: pomc-rally-planner
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: POMC-Rally-Planner-v1.0.0-Windows-${{ matrix.arch }}-MSI
          path: pomc-rally-planner/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: POMC-Rally-Planner-v1.0.0-Windows-${{ matrix.arch }}-Setup
          path: pomc-rally-planner/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
