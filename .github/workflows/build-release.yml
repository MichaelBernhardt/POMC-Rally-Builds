name: Build Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: AppleSilicon
          - target: x86_64-apple-darwin
            arch: Intel
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: pomc-rally-planner/src-tauri

      - name: Install dependencies
        working-directory: pomc-rally-planner
        run: npm install

      - name: Build Tauri app
        working-directory: pomc-rally-planner
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: POMC-Rally-Planner-${{ github.event.inputs.version }}-macOS-${{ matrix.arch }}-DMG
          path: pomc-rally-planner/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  build-windows:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x64
          - target: aarch64-pc-windows-msvc
            arch: ARM64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: pomc-rally-planner/src-tauri

      - name: Install dependencies
        working-directory: pomc-rally-planner
        run: npm install

      - name: Build Tauri app
        working-directory: pomc-rally-planner
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: POMC-Rally-Planner-${{ github.event.inputs.version }}-Windows-${{ matrix.arch }}-MSI
          path: pomc-rally-planner/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

      - name: Upload Windows Setup EXE
        uses: actions/upload-artifact@v4
        with:
          name: POMC-Rally-Planner-${{ github.event.inputs.version }}-Windows-${{ matrix.arch }}-Setup
          path: pomc-rally-planner/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

  build-linux:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: pomc-rally-planner/src-tauri

      - name: Install dependencies
        working-directory: pomc-rally-planner
        run: npm install

      - name: Build Tauri app
        working-directory: pomc-rally-planner
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: POMC-Rally-Planner-${{ github.event.inputs.version }}-Linux-${{ matrix.arch }}-DEB
          path: pomc-rally-planner/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: POMC-Rally-Planner-${{ github.event.inputs.version }}-Linux-${{ matrix.arch }}-AppImage
          path: pomc-rally-planner/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
